<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanRISE | Knowledge Hub Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <!-- Login Container -->
    <div id="loginPage" class="flex flex-col items-center justify-center min-h-screen p-6">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
            <img src="logo.png" alt="CanRISE Logo" class="w-32 h-32 mx-auto mb-6 rounded-full border-2 border-blue-500/50">
            <h2 class="text-2xl font-bold mb-6">CanRISE Knowledge Hub Login</h2>
            <form id="loginForm" class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="password" id="password" placeholder="Password" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg transition">Access Database</button>
            </form>
            <p id="errorMsg" class="text-red-400 mt-4 hidden text-sm">Invalid credentials.</p>
        </div>
    </div>

    <!-- Data Matrix Container (Initially Hidden) -->
    <div id="dataPage" class="hidden bg-slate-50 text-slate-900 p-4 md:p-8 min-h-screen">
        <div class="max-w-[95vw] mx-auto">
            <header class="mb-8">
                <h1 class="text-3xl font-bold text-slate-900">CanRISE Knowledgebase (KB)</h1>
                <p class="text-slate-600 mt-2">Comprehensive Consortium Internal Repository</p>
            </header>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <div class="flex flex-col md:flex-row justify-between gap-4 mb-6">
                    <input type="text" id="searchInput" placeholder="Search across all CanRISE KB data..." class="border border-slate-300 rounded-lg px-4 py-2 w-full md:w-1/3 focus:ring-2 focus:ring-blue-500 outline-none">

                </div>

                <div class="overflow-x-auto shadow-inner rounded-lg border border-slate-200">
                    <table class="w-full text-left border-collapse min-w-[2000px]" id="dataTable">
                        <thead>
                          <tr class="bg-slate-800 text-white text-xs uppercase tracking-wider"></tr>
                        </thead>
                        <tbody id="tableBody" class="text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

<script>
  let knowledgeDatabase = { headers: [], rows: [] };

  function cleanValue(value) {
    if (value === null || value === undefined) return "";
    return String(value).trim();
  }

  function getHeaders(rows) {
    return rows.length ? Object.keys(rows[0]) : [];
  }

  function renderHeaders() {
    const theadRow = document.querySelector("#dataTable thead tr");
    theadRow.innerHTML = knowledgeDatabase.headers.map((header, i) => {
      const sticky = i === 0 ? " sticky left-0 bg-slate-800" : "";
      return `<th class="p-3${sticky}">${header}</th>`;
    }).join("");
  }

  function renderTable(filter = "") {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    const q = filter.toLowerCase();
    const filtered = knowledgeDatabase.rows.filter(row =>
      Object.values(row).some(v => cleanValue(v).toLowerCase().includes(q))
    );

    filtered.forEach(row => {
      const tr = document.createElement("tr");
      tr.className = "border-b border-slate-100 hover:bg-slate-50";

      tr.innerHTML = knowledgeDatabase.headers.map((header, i) => {
        const value = cleanValue(row[header]);
        const sticky = i === 0 ? " sticky left-0 bg-white border-r font-bold" : "";
        return `<td class="p-3${sticky}">${value}</td>`;
      }).join("");

      tbody.appendChild(tr);
    });
  }


  async function loadData() {
    const res = await fetch("turex2.json", { cache: "no-store" });
    if (!res.ok) throw new Error(`Failed to load turex2.json: ${res.status}`);
    const data = await res.json();

    knowledgeDatabase.rows = Array.isArray(data) ? data : [];
    knowledgeDatabase.headers = getHeaders(knowledgeDatabase.rows);

    renderHeaders();
    renderTable();
  }

  document.getElementById("loginForm").addEventListener("submit", e => {
    e.preventDefault();
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if (user === "guest" && pass === "guest") {
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("dataPage").classList.remove("hidden");
      renderTable(document.getElementById("searchInput").value);
    } else {
      document.getElementById("errorMsg").classList.remove("hidden");
    }
  });

  document.getElementById("searchInput").addEventListener("input", e => {
    renderTable(e.target.value);
  });

  document.addEventListener("contextmenu", e => e.preventDefault());
  document.addEventListener("auxclick", e => {
    if (e.button === 1) e.preventDefault();
  });

  window.addEventListener("DOMContentLoaded", () => {
    loadData().catch(err => {
      console.error(err);
      document.getElementById("tableBody").innerHTML =
        `<tr><td class="p-4 text-red-600" colspan="50">Failed to load turex2.json</td></tr>`;
    });
  });
</script>

</body>
</html>
